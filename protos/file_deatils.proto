syntax = "proto3";

package file_details;

message ChunkMetadata {
  string chunk_id = 1;
  int64 size = 2;
  string hash = 3;
  repeated string replication_servers = 4;
  int32 replication_factor = 5;
  int64 timestamp = 6;
}

message FileChunk {
  string chunk_id = 1;
  bytes data = 2;
  uint32 chunk_size = 3;
  string hash = 4;
}

message FileDetails {
  string file_name = 1;
  uint64 file_size = 2;
  string hash = 3;
  optional string time_stamp = 4;
  repeated ChunkMetadata chunks = 5;
  int32 total_chunks = 6;
  string owner = 7;
  repeated string permissions = 8;
}

message FileRequest {
  string file_name = 1;
  string operation = 2; // "upload", "download", "delete", "list"
  bytes file_data = 3;
  int32 replication_factor = 4;
}

message FileResponse {
  string file_name = 1;
  bool success = 2;
  string error_message = 3;
  bytes file_data = 4;
  FileDetails file_details = 5;
}
